                <div class="profile-menu-actions" id="profile-menu-actions">
                    <button class="btn profile-menu-btn" id="profile-menu-btn" type="button">☰</button>
                    <div class="profile-menu" id="profile-menu" hidden>

                        <button class="btn profile-menu-item" id="profile-logout-btn" type="button">Выйти</button>

                    </div>
                </div>
                <label class="profile-avatar-label">
                    <input type="file" id="avatar-input" accept="image/*" class="profile-avatar-input" hidden>
                    <span class="profile-avatar" id="avatar-preview"></span>
                </label>
                <div class="profile-info">

                        <span class="profile-id" id="profile-id">ID: —</span>
                    </div>
                    <textarea id="profile-bio" class="profile-bio" rows="1" maxlength="1000" placeholder="Расскажите о себе"></textarea>
                </div>
            </div>
            <div class="profile-lower">
                <a href="public.html" id="publish-link"><button class="btn">Опубликовать</button></a>
                <div class="profile-tabs">
                    <button class="btn profile-tab profile-tab--active" aria-selected="true" data-tab="posts" id="tab-posts">Мои публикации</button>
                    <button class="btn profile-tab" aria-selected="false" data-tab="likes" id="tab-likes">Понравившиеся</button>
                </div>
                <div class="profile-panels">
                    <div class="profile-panel profile-panel--active" id="panel-posts">
                        <div class="profile-gallery" id="gallery-posts"></div>
                        <p class="profile-empty" id="empty-posts">Публикаций пока нет</p>
                    </div>
                    <div class="profile-panel" id="panel-likes" hidden>
                        <div class="profile-gallery" id="gallery-likes"></div>
                        <p class="profile-empty" id="empty-likes">Нет понравившихся изображений</p>
